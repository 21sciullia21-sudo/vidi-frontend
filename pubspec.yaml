name: vidi
description: AI Chat application template with simple design
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_stripe: ^12.0.0
  flutter_stripe_web: ^7.1.0  <-- Changed from ^5.1.0 to ^7.1.0
  video_player: '>=2.9.2'
  uuid: ^4.0.0
  image_picker: '>=1.1.2'
  image_cropper: ^11.0.0
  url_launcher: ^6.2.0
  file_picker: '>=8.1.2'
  intl: 0.20.2
  shared_preferences: ^2.2.2
  supabase_flutter: '>=1.10.0'
  provider: ^6.1.1
  lucide_icons: ^0.257.0
  flutter_markdown: ^0.7.4+1
  markdown: ^7.1.1
  flutter_highlight: ^0.7.0
  google_fonts: ^6.1.0
  http: ^1.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

